<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Burbuja - Productos de Aseo</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <!-- Tipografías -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Estilos propios -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Navbar Superior Minimalista -->
  <nav class="navbar-top">
    <div class="container d-flex justify-content-center">
      <a class="navbar-brand d-flex align-items-center text-decoration-none" href="#">
        <span class="brand-icon"><i class="bi bi-stars"></i></span>
        Burbuja Especial
      </a>
    </div>
  </nav>

  <!-- Aviso de horario (dinámico) -->
  <div id="horario-aviso" class="alert alert-secondary text-center mx-3 rounded-pill d-none border-0 shadow-sm" role="alert" style="background: var(--card-bg); color: var(--texto);">
    <i class="bi bi-clock-history text-danger"></i> Tienda cerrada. <span id="horario-texto"></span>
  </div>

  <!-- Contenedor de toasts -->
  <div aria-live="polite" aria-atomic="true" class="toast-container position-fixed top-0 start-50 translate-middle-x p-3" style="z-index: 1100">
    <div id="toastPedido" class="toast align-items-center" role="alert" data-bs-delay="4000">
      <div class="d-flex px-2 py-1">
        <div class="toast-body fw-medium">
          <i class="bi bi-check-circle-fill" style="color: var(--rosa-oscuro)"></i> ¡Pedido enviado!<br>
          <small class="text-muted">Preparando tus productos de cuidado.</small>
        </div>
        <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

  <!-- Contenido principal -->
  <main class="container my-3">
    <h3 class="mb-4 text-center fw-bold" style="color: var(--rosa-oscuro);">
      Cuidado & Aseo Personal
    </h3>
    <div id="productos-container" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-3 g-md-4">
      <div class="col"><div class="skeleton skeleton-card"></div></div>
      <div class="col"><div class="skeleton skeleton-card"></div></div>
      <div class="col"><div class="skeleton skeleton-card"></div></div>
      <div class="col"><div class="skeleton skeleton-card"></div></div>
    </div>
  </main>

  <!-- Burbujas Flotantes -->
  <button class="burbuja burbuja-theme border-0" onclick="toggleTheme()" aria-label="Cambiar tema">
    <i class="bi bi-moon-stars-fill" id="theme-icon"></i>
  </button>

  <button class="burbuja burbuja-cart border-0" type="button" data-bs-toggle="offcanvas" data-bs-target="#carritoOffcanvas">
    <i class="bi bi-bag-heart"></i>
    <span id="cart-count" class="badge-burbuja">0</span>
  </button>

  <!-- Navegación Inferior Ondulada -->
  <div id="bottom-nav-wrapper">
    <!-- SVG Ondulación amplia e irregular con depresión entre X=650 y X=930 -->
    <svg class="wave-svg" viewBox="0 0 1000 70" preserveAspectRatio="none">
      <path d="M 0 40
               Q 150 10, 300 35
               T 600 25
               C 650 25, 720 68, 800 68
               C 880 68, 930 15, 1000 15
               L 1000 70 L 0 70 Z"></path>
    </svg>
    <div class="categorias-nav" id="categorias-nav">
      <div id="categorias-container" class="d-flex w-100 align-items-center">
        <span class="skeleton skeleton-chip"></span>
        <span class="skeleton skeleton-chip"></span>
        <span class="skeleton skeleton-chip"></span>
      </div>
    </div>
  </div>

  <!-- Offcanvas carrito -->
  <div class="offcanvas offcanvas-end shadow" tabindex="-1" id="carritoOffcanvas">
    <div class="offcanvas-header border-0 pb-0 mt-2">
      <h4 class="offcanvas-title fw-bold" style="color: var(--rosa-oscuro);"><i class="bi bi-bag-heart-fill"></i> Tu Cesta</h4>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
      <div id="carrito-lista" class="list-group mb-4 gap-2 border-0"></div>

      <div class="bg-light bg-opacity-10 p-3 rounded-4 mb-4 border" style="border-color: var(--borde-suave) !important;">
        <!-- Método de pago -->
        <div class="mb-3">
          <label class="form-label fw-semibold ms-2">Método de pago</label>
          <select id="metodo-pago" class="form-select shadow-sm" onchange="actualizarCarrito()">
            <option value="efectivo">Efectivo</option>
            <option value="transferencia">Transferencia</option>
          </select>
          <small id="recargo-info" class="text-danger ms-2 d-none mt-1"></small>
        </div>

        <!-- Reparto -->
        <div class="mb-1">
          <label class="form-label fw-semibold ms-2">Zona de entrega</label>
          <div class="reparto-autocomplete position-relative">
            <input type="text" id="reparto-input" class="form-control shadow-sm" placeholder="Buscar mi zona..." autocomplete="off" oninput="filtrarRepartos()" onfocus="mostrarSugerencias()">
            <input type="hidden" id="reparto-id" value="">
            <input type="hidden" id="reparto-precio" value="">
            <div class="reparto-sugerencias" id="reparto-sugerencias"></div>
          </div>
          <div id="reparto-seleccionado" class="reparto-seleccionado d-none mt-2 shadow-sm">
            <span id="reparto-seleccionado-texto" class="fw-medium"></span>
            <i class="bi bi-x-circle-fill fs-5 btn-limpiar" onclick="limpiarReparto()" title="Quitar reparto"></i>
          </div>
        </div>
      </div>

      <!-- Desglose -->
      <div class="px-2">
        <div class="d-flex justify-content-between mb-1 text-muted small">
          <span>Subtotal de productos:</span> <span id="subtotal-carrito">0.00</span>
        </div>
        <div id="recargo-desglose" class="d-flex justify-content-between mb-1 text-muted small d-none">
          <span>Recargo bancario:</span> <span id="recargo-aplicado">0.00</span>
        </div>
        <div id="envio-desglose" class="d-flex justify-content-between mb-2 text-muted small d-none">
          <span>Costo de envío:</span> <span id="envio-aplicado">0.00</span>
        </div>
        <div class="d-flex justify-content-between align-items-center border-top pt-3 mt-2 border-opacity-25" style="border-color: var(--rosa-oscuro) !important;">
          <span class="fs-5 fw-semibold">Total:</span>
          <span id="total-pedido" class="fs-4 fw-bold" style="color: var(--rosa-oscuro);">0.00 CUP</span>
        </div>
      </div>

      <button id="btn-checkout" class="btn btn-rosa w-100 mt-4 py-2 fs-5 shadow-sm" disabled>
        Procesar Pedido <i class="bi bi-arrow-right-short"></i>
      </button>
    </div>
  </div>

  <!-- Modal checkout -->
  <div class="modal fade" id="checkoutModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0 shadow-lg">
        <div class="modal-header border-0 pb-0 mt-2 mx-2">
          <h5 class="modal-title fw-bold" style="color: var(--rosa-oscuro);"><i class="bi bi-geo-alt-fill"></i> Detalles de Envío</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-4">
          <div id="checkout-error" class="alert alert-danger rounded-pill py-2 text-center d-none" role="alert">
            <i class="bi bi-exclamation-triangle-fill"></i> <span id="error-text"></span>
          </div>
          <form id="checkout-form">
            <div class="mb-3">
              <input type="text" class="form-control" id="nombre" placeholder="Nombre completo" required>
            </div>
            <div class="mb-3">
              <input type="tel" class="form-control" id="telefono" placeholder="Número de Teléfono" required>
            </div>
            <div class="mb-3">
              <textarea class="form-control" id="direccion" rows="2" placeholder="Dirección exacta de entrega" required></textarea>
            </div>
            <div class="mb-1">
              <textarea class="form-control" id="referencia" rows="1" placeholder="Punto de referencia (Opcional)"></textarea>
            </div>
          </form>
        </div>
        <div class="modal-footer border-0 pt-0 pb-4 px-4 d-flex gap-2">
          <button type="button" class="btn btn-light rounded-pill px-4 flex-grow-1" data-bs-dismiss="modal">Volver</button>
          <button type="button" class="btn btn-rosa rounded-pill px-4 flex-grow-1" id="confirmar-pedido">Confirmar <i class="bi bi-check2"></i></button>
        </div>
      </div>
    </div>
  </div>

  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Lógica de la app -->
  <script src="js/app.js"></script>
</body>
</html>
